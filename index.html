            "@type": "Question",
            "name": "O co se vlastně jedná?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hive House představuje unikátní spojení moderního glampingu (luxusního ubytování v přírodě) a tradiční síly včel. Spíte přímo nad aktivními včelími úly v Hojanovicích na Vysočině."
            }
          },
          {
            "@type": "Question",
            "name": "Jak to celé funguje?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Včelstva jsou umístěna přímo pod postelemi. Díky speciálnímu zabezpečení a vchodům do úlů pouze z venkovní strany domku se k vám včely dovnitř nedostanou. V naprostém klidu a bezpečí tak vnímáte jejich přítomnost všemi smysly."
            }
          },
          {
            "@type": "Question",
            "name": "Proč se u nás ubytovat?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hive House není obyčejným ubytováním, je o prožitku. Jemný včelí bzukot, přirozené teplo a čistý úlový vzduch posilují imunitu, podporují kvalitní spánek a pomáhají s dýchacími potížemi i stresem."
            }
          },
          {
            "@type": "Question",
            "name": "Kde se Hive House nachází?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hive House najdete v obci Hojanovice 17, 396 01, v Kraji Vysočina. Jsme v klidné přírodě s vlastním soukromým rybníkem."
            }
          },
          {
            "@type": "Question",
            "name": "Je apiterapie bezpečná?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Ano. Hosté se včelami nepřijdou do přímého kontaktu — úly mají vchody jen z venkovní strany. Konzultujte se svým lékařem, pokud máte silnou alergii na včelí jed."
            }
          }
        ]

    <!-- SPA redirect pickup — pro GitHub Pages (public/404.html uloží cílovou cestu). -->
    <script>
      (function () {
        try {
          var target = sessionStorage.getItem("spa:redirect");
          if (target) {
            sessionStorage.removeItem("spa:redirect");
            if (target !== location.pathname + location.search + location.hash) {
              history.replaceState({}, "", target);
            }
          }
        } catch (_) { /* noop */ }
      })();
